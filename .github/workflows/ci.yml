name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, linux, taco-platform]
    strategy:
      matrix:
        go-version: ["1.25.x", "1.26.x"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.go-version == '1.26.x'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: [self-hosted, linux, taco-platform]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
